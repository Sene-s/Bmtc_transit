<!DOCTYPE html>
<html lang="en">  
<head>  
    <meta charset="UTF-8" />  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />  
    <title>BMTC TransitFlow</title>  
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />  
    <link rel="stylesheet" href="styles.css"/>  
</head>  
<body>  
    <div id="sidebar">  
        <div class="search-area">  
            <div style="font-size:14px; font-weight:900; color:#22c55e; margin-bottom:15px; letter-spacing:1px;">BMTC TRANSITFLOW</div>
            <div class="input-wrap">  
                <div class="input-icon icon-start"></div>  
                <input id="sIn" placeholder="Start stop..." oninput="onSearch('s')" autocomplete="off">  
                <div id="sList" class="dropdown"></div>  
            </div>  
            <div class="input-wrap">  
                <div class="input-icon icon-end"></div>  
                <input id="eIn" placeholder="Destination stop..." oninput="onSearch('e')" autocomplete="off">  
                <div id="eList" class="dropdown"></div>  
            </div>  
            <button id="find-btn" onclick="run()">Find Route</button>  
        </div>  
        <div id="out"><div style="padding:40px; text-align:center; color:#444;">Search for stops to plan your route.</div></div>
        <div style="font-size:10px; color:#22c55e; padding:10px 20px 0 20px; font-weight:bold; letter-spacing:1px;">BOOKMARKS</div>
        <div id="favorites-list"></div>
    </div>  
    <div id="map"></div>  
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>  
    <script src="script.js"></script>  
</body>  
</html>
